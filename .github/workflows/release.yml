# Builds SyncPlay and its Windows installer on every version tag (v1.2.3) and
# attaches the installer to a GitHub Release.
#
# Release flow:
#   1. bump project(SyncPlay VERSION x.y.z) in CMakeLists.txt, commit, push
#   2. git tag vx.y.z && git push origin vx.y.z

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download libmpv dev SDK
        shell: pwsh
        env:
          # Authenticate the GitHub API call: unauthenticated api.github.com is
          # rate-limited from Actions runner IPs and often returns 403.
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          # mpv has no official Windows dev SDK; zhongfly/mpv-winbuild publishes
          # continuously-built dev packages. Pick the baseline x86_64 build (not
          # v3 — that needs AVX2 which some users' CPUs lack).
          $headers = @{ "User-Agent" = "SyncPlay-CI"; "Authorization" = "Bearer $env:GH_TOKEN" }
          $rel = Invoke-RestMethod "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest" -Headers $headers
          $asset = $rel.assets | Where-Object { $_.name -match '^mpv-dev-x86_64-\d{8}' -and $_.name -notmatch 'v3' } | Select-Object -First 1
          if (-not $asset) { throw "No mpv-dev-x86_64 asset found in latest mpv-winbuild release" }
          Write-Host "Downloading $($asset.name)"
          Invoke-WebRequest $asset.browser_download_url -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-dev -y | Out-Null

          # Locate the pieces regardless of the archive's exact layout.
          $dll = Get-ChildItem mpv-dev -Recurse -Filter libmpv-2.dll | Select-Object -First 1
          if (-not $dll) { throw "libmpv-2.dll not found in the mpv-dev archive" }
          $clientH = Get-ChildItem mpv-dev -Recurse -Filter client.h |
                     Where-Object { $_.Directory.Name -eq 'mpv' } | Select-Object -First 1
          if (-not $clientH) { throw "mpv headers (include/mpv/client.h) not found" }
          $incParent = $clientH.Directory.Parent.FullName  # folder that contains mpv/

          New-Item -ItemType Directory -Force C:\packages\mpv\bin | Out-Null
          New-Item -ItemType Directory -Force C:\packages\mpv\lib | Out-Null
          New-Item -ItemType Directory -Force C:\packages\mpv\include | Out-Null
          Copy-Item (Join-Path $incParent 'mpv') C:\packages\mpv\include\ -Recurse -Force
          Copy-Item $dll.FullName C:\packages\mpv\bin\

          # Build the MSVC import lib directly from the DLL's exports (no reliance
          # on a shipped .def). The LIBRARY line MUST name the real DLL, or the exe
          # imports a non-existent "mpv.dll" and fails to launch.
          $names = & dumpbin /nologo /exports $dll.FullName |
            ForEach-Object { if ($_ -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\w\S*)') { $matches[1] } } |
            Where-Object { $_ }
          if (-not $names) { throw "No exports parsed from libmpv-2.dll" }
          @("LIBRARY libmpv-2.dll", "EXPORTS") + $names |
            Set-Content C:\packages\mpv\lib\mpv.def -Encoding ascii
          lib /nologo /def:C:\packages\mpv\lib\mpv.def /machine:x64 /out:C:\packages\mpv\lib\mpv.lib
          Write-Host "Generated mpv.lib with $($names.Count) exports"

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B cmake-build-release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DMPV_ROOT=C:/packages/mpv

      - name: Build
        shell: pwsh
        run: cmake --build cmake-build-release --target SyncPlay

      - name: Stage libmpv next to the exe
        shell: pwsh
        run: Copy-Item C:\packages\mpv\bin\libmpv-2.dll cmake-build-release\

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME".TrimStart("v")
          powershell -ExecutionPolicy Bypass -File packaging\build_installer.ps1 -Version $version -SkipBuild

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/SyncPlay-Setup-*.exe
          generate_release_notes: true
